<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>East Point Hospital | Advanced Management System</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Google Fonts for a clean, professional look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">
                    <div class="logo-icon">
                        <i data-lucide="hospital"></i>
                    </div>
                    <span>EAST POINT</span>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul>
                    <li>
                        <a href="#" class="nav-link active" data-section="dashboard">
                            <i data-lucide="layout-dashboard"></i>
                            <span>Dashboard</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="patients">
                            <i data-lucide="users"></i>
                            <span>Patients</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="doctors">
                            <i data-lucide="user-plus"></i>
                            <span>Doctors</span>
                        </a>
                    </li>
                    <li>
                        <a href="#" class="nav-link" data-section="appointments">
                            <i data-lucide="calendar"></i>
                            <span>Appointments</span>
                        </a>
                    </li>
                </ul>
            </nav>

            <div class="sidebar-footer">
                <div class="user-profile">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="User" class="avatar">
                    <div class="user-info">
                        <span class="user-name">Dr. Aris Thorne</span>
                        <span class="user-role">Administrator</span>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-navbar">
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" placeholder="Search patients, records, or doctors...">
                </div>
                <div class="navbar-actions">
                    <button class="btn-icon" title="Notifications">
                        <i data-lucide="bell"></i>
                        <span class="notification-badge"></span>
                    </button>
                    <button class="btn-primary" id="btn-quick-appointment">
                        <i data-lucide="plus"></i>
                        <span>New Appointment</span>
                    </button>
                </div>
            </header>

            <section id="content-area" class="content-fade-in">
                <!-- Dynamic Content Loads Here -->
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">New Entry</h2>
                <button class="btn-close-modal"><i data-lucide="x"></i></button>
            </div>
            <div class="modal-body" id="modal-body-content">
                <!-- Form content injected here -->
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
